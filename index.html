<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Mafia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Smooth transitions */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen w-screen overflow-hidden">
    <div id="app" class="h-full w-full overflow-y-auto"></div>

    <script>
        // ==========================================
        // CONSTANTS & DATA
        // ==========================================
        const BOT_NAMES = ['Aura', 'Nexus', 'Oracle', 'Vanguard', 'Apex', 'Solstice', 'Zenith', 'Paradox', 'Onyx', 'Nova', 'Helix', 'Quantum', 'Obelisk', 'Aegis', 'Vortex', 'Synapse', 'Prism', 'Bastion', 'Cipher', 'Atlas'];

        const AVATARS = [
            { emoji: '🤖', bg: 'bg-blue-500/20', border: 'border-blue-500/50' },
            { emoji: '👾', bg: 'bg-purple-500/20', border: 'border-purple-500/50' },
            { emoji: '👽', bg: 'bg-green-500/20', border: 'border-green-500/50' },
            { emoji: '🦊', bg: 'bg-orange-500/20', border: 'border-orange-500/50' },
            { emoji: '🦉', bg: 'bg-amber-500/20', border: 'border-amber-500/50' },
            { emoji: '🦄', bg: 'bg-pink-500/20', border: 'border-pink-500/50' },
            { emoji: '🐉', bg: 'bg-emerald-500/20', border: 'border-emerald-500/50' },
            { emoji: '🐙', bg: 'bg-indigo-500/20', border: 'border-indigo-500/50' },
            { emoji: '🦁', bg: 'bg-yellow-500/20', border: 'border-yellow-500/50' },
            { emoji: '🐼', bg: 'bg-zinc-500/20', border: 'border-zinc-500/50' },
            { emoji: '🐸', bg: 'bg-lime-500/20', border: 'border-lime-500/50' },
            { emoji: '🐯', bg: 'bg-orange-600/20', border: 'border-orange-600/50' }
        ];

        // Rewritten for concise bullet points in local model prompts
        const ROLE_DESCRIPTIONS = {
            'Town': 'No special ability. Votes during the day.',
            'Doctor': 'May protect one player each night from elimination.',
            'Detective': 'Investigates one player each night to learn if they are Mafia or not.',
            'Vigilante': 'Has one single bullet to shoot a suspected player at night.',
            'Spy': 'Secretly learns the count of unique roles remaining in the game each night.',
            'Indecisive': 'Identity is publicly revealed on Day 1, but is completely unable to vote.',
            'Mafia': 'Votes with the Mafia team each night to eliminate Town members. Knows every living Mafia member.',
            'Jailor': 'Can block a player\'s ability at night and mute them during the next day (two uses per game).',
            'Eraser': 'Can permanently erase someone\'s role (turns them into Vanilla Town). Can be blocked by Doctor.',
            'Jester': 'Sole objective is to trick the town into voting them out during the day.',
            'Lover': 'Bonds with someone on Night 1. If their bond dies, they die. If their bond wins, they win.',
            'Guesser': 'Once per game, guess that you will be targeted that night. If right: Win. If wrong: Eliminated.',
            'Assassin': 'Can guess a player\'s role during the day. Correct: target eliminated. Wrong: target learns Assassin\'s identity and power is lost.'
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let appState = 'setup'; 
        let geminiApiKey = '';
        let groqApiKey = '';
        let mistralApiKey = '';
        let useOllama = false;
        let ollamaModel = 'llama3.1';
        let numAIs = 6;
        let humanPlaying = false;
        let preferredRole = '';
        let showStartingMsg = false;
        let roles = { doctor: true, detective: true, vigilante: false, spy: false, indecisive: false, jailor: false, eraser: false, assassin: false, jester: false, lover: false, guesser: false };
        
        let players = [];
        let selectedSwapId = null;

        // Game State
        let gamePhase = 'Initializing...';
        let gameDay = 1;
        let activePlayer = null;
        let logs = [];
        let humanInputMode = null; 
        let humanPromptText = '';
        let chatInputValue = '';
        let winner = null;
        
        // Assassin State
        let assassinationMenuOpen = false;
        let assassinTargetId = '';
        let assassinGuess = '';

        // Engine Internals (STRUCTURED AI MEMORY)
        let isGameActive = false;
        let aiMemory = {}; // Holds { privateKnowledge: [], actionHistory: [] } per player
        let publicEvents = []; // Public facts array
        let recentDiscussion = []; // Rolling array of recent chats
        let humanResolve = null;
        let nightActions = {};
        let doctorLastProtectedId = null;

        const delay = (ms) => new Promise(res => setTimeout(res, ms));
        const gameDelay = async (ms, isNight = false) => {
            const human = players.find(p => p.isHuman);
            if (humanPlaying && isNight && human && human.isAlive) await delay(800);
            else await delay(ms);
        };

        // ==========================================
        // UTILS & PROMPT BUILDERS
        // ==========================================
        const getRoleAlignment = (roleName) => {
            if (['Jailor', 'Eraser', 'Assassin', 'Mafia'].includes(roleName)) return 'Mafia';
            if (['Jester', 'Lover', 'Guesser'].includes(roleName)) return 'Neutral';
            return 'Town';
        };

        const getAlignmentColor = (alignment) => {
            if (alignment === 'Mafia') return 'text-red-400';
            if (alignment === 'Neutral') return 'text-purple-400';
            return 'text-blue-400';
        };

        const getRoleBadgeStyle = (roleName) => {
            if (roleName === 'Town') return 'bg-green-600 text-white border-green-500';
            if (['Doctor', 'Detective', 'Vigilante', 'Spy', 'Indecisive'].includes(roleName)) return 'bg-blue-600 text-white border-blue-500';
            if (['Jester', 'Lover', 'Guesser'].includes(roleName)) return 'bg-yellow-500 text-gray-900 border-yellow-400';
            if (roleName === 'Mafia') return 'bg-red-600 text-white border-red-500';
            if (['Jailor', 'Eraser', 'Assassin'].includes(roleName)) return 'bg-black text-white border-gray-500';
            return 'bg-gray-700 text-white border-gray-600';
        };

        const getRolePillStyle = (roleName, isSelected) => {
            if (isSelected) return 'bg-purple-600 text-white border-purple-400 ring-2 ring-purple-400 ring-offset-2 ring-offset-gray-900';
            return getRoleBadgeStyle(roleName).replace('bg-', 'bg-opacity-90 bg-').replace('text-white', 'text-white hover:opacity-80');
        };

        const isSetupValid = () => geminiApiKey.trim() || groqApiKey.trim() || mistralApiKey.trim() || useOllama;

        const getFormatGuide = (taskType) => {
            if (taskType === 'chat') return "One natural discussion message.\nNothing else.";
            if (taskType === 'vote') return "Reasoning...\n\nVOTE: PlayerName\n(Or VOTE: None)";
            if (taskType === 'target') return "Reasoning...\n\nTARGET: PlayerName\n(Or TARGET: None)";
            if (taskType === 'guess') return "Reasoning...\n\nGUESS: Yes\n(Or GUESS: No)";
            if (taskType === 'assassinate') return "Reasoning...\n\nASSASSINATE: PlayerName - RoleName\n(Or ASSASSINATE: None)";
            return "";
        };

        const getObjectiveText = (player) => {
            const align = getRoleAlignment(player.role);
            if (align === 'Mafia') {
                const aliveMafia = players.filter(p => p.isAlive && getRoleAlignment(p.role) === 'Mafia').map(p => p.name).join(', ');
                return `Your objective:\nRemain hidden until the Mafia equal or outnumber the remaining Town.\nYou know the identities of every living Mafia member: ${aliveMafia}.\nYou may lie.\nYou may bluff.\nYou may accuse innocent players.\nYou may defend yourself.\nChoose whatever strategy you believe gives your team the best chance of winning.`;
            } else if (align === 'Neutral') {
                if (player.role === 'Jester') return `Your objective:\nTrick the town into voting you out during the day.\nAct suspiciously, but do not be too obvious.\nChoose your own strategy.`;
                if (player.role === 'Lover') return `Your objective:\nSurvive with your bonded partner. If they win, you win. If they die, you die.\nChoose your own strategy.`;
                if (player.role === 'Guesser') return `Your objective:\nSurvive and successfully use your one-time guess.\nChoose your own strategy.`;
            } else {
                return `Your objective:\nHelp eliminate every Mafia member.\nYou may accuse, defend, question, bluff about suspicions, or stay cautious.\nChoose your own strategy.`;
            }
        };

        const buildAIPrompt = (player, taskPrompt, formatGuide, repromptError = "") => {
            const alivePlayers = players.filter(p => p.isAlive).map(p => p.name);
            const deadPlayers = players.filter(p => !p.isAlive).map(p => p.name);
            const activeRolesInGame = [...new Set(players.map(p => p.role))];
            
            const rolesListText = activeRolesInGame.map(r => `• ${r}\n  - ${ROLE_DESCRIPTIONS[r] || 'No special ability.'}`).join('\n\n');
            const align = getRoleAlignment(player.role);
            const mem = aiMemory[player.id];
            const objectiveText = getObjectiveText(player);
            
            let prompt = `You are ${player.name}.
Your role is ${player.role} (${align}).
You are currently alive.

Everything below describes the current game state.

ROLES AT THE START OF THIS MATCH:
${rolesListText}

Some of these roles may now belong to dead players. Do not assume every role is still alive.

YOUR ROLE & OBJECTIVE:
${objectiveText}

CURRENT TIME
Day: ${gameDay}
Phase: ${gamePhase}

Everything below has already happened. Nothing after this point has happened yet.

RULES & CONSTRAINTS
- Moderator facts are always true.
- Player statements are not guaranteed to be true. Players may lie, bluff, or be mistaken. Reason accordingly.
- Never invent moderator events. Do not invent: deaths, investigations, role reveals, vote results, eliminations, protected targets, hidden information, or actions that have already occurred.
- You are encouraged to invent: opinions, suspicions, accusations, defenses, theories, lies, bluffs, and strategies provided they do not contradict the moderator's structured information.
- Speak naturally. Do not explain what you are about to do. Do not narrate your reasoning process. Do not describe following instructions. Simply speak as your character.
- Conversational examples: "I don't think we have enough information yet.", "That accusation feels premature.", "I'd like to hear more from Solstice.", "I disagree with that conclusion."

MODERATOR FACTS
Alive Players (${alivePlayers.length}):
${alivePlayers.length ? '- ' + alivePlayers.join('\n- ') : 'None'}

Dead Players:
${deadPlayers.length ? '- ' + deadPlayers.join('\n- ') : 'None'}

Public Events:
${publicEvents.length ? publicEvents.map(e => '- ' + e).join('\n') : '- Nothing has happened yet.'}

YOUR MEMORY (Private Knowledge)
${mem.privateKnowledge.length ? mem.privateKnowledge.map(e => '- ' + e).join('\n') : '- Nothing yet.'}

YOUR ACTIONS (History)
${mem.actionHistory.length ? mem.actionHistory.map(e => '- ' + e).join('\n') : '- No actions taken yet.'}

RECENT DISCUSSION
${recentDiscussion.length ? recentDiscussion.join('\n') : 'No recent discussion.'}

YOUR TASK
${taskPrompt}

OUTPUT FORMAT REQUIRED:
${formatGuide}
`;

            if (repromptError) {
                prompt += `\n\nERROR ON PREVIOUS ATTEMPT:\n${repromptError}\nYou MUST correct this and follow the requested format exactly!`;
            }

            return prompt;
        };

        // ==========================================
        // UI RENDERING SYSTEM
        // ==========================================
        function render() {
            const app = document.getElementById('app');
            if (appState === 'setup') app.innerHTML = renderSetup();
            else if (appState === 'lobby') app.innerHTML = renderLobby();
            else if (appState === 'game') app.innerHTML = renderGame();
            lucide.createIcons();
            
            if (appState === 'game') {
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            const el = document.getElementById('logs-container');
            if (el) el.scrollTop = el.scrollHeight;
        }

        // ==========================================
        // SETUP VIEW
        // ==========================================
        function renderRoleToggle(key, title, alignment, description, iconName) {
            const isEnabled = roles[key];
            const alignmentColors = {
                Town: 'text-blue-400 bg-blue-400/10 border-blue-400/20',
                Neutral: 'text-purple-400 bg-purple-400/10 border-purple-400/20',
                Mafia: 'text-red-400 bg-red-400/10 border-red-400/20'
            };
            const colorClass = alignmentColors[alignment] || 'text-gray-400 bg-gray-400/10 border-gray-400/20';
            
            return `
                <div class="flex items-start gap-4 p-4 rounded-xl border ${colorClass} transition-all ${isEnabled ? 'bg-opacity-20 border-opacity-50' : 'opacity-60'}">
                    <div class="mt-1"><i data-lucide="${iconName}" style="width: 24px; height: 24px;"></i></div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-1">
                            <h3 class="font-bold text-lg">${title} <span class="text-sm font-normal opacity-75">(${alignment})</span></h3>
                            <button type="button" onclick="window.handleRoleToggle('${key}')" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-blue-500 ${isEnabled ? 'bg-green-500' : 'bg-gray-600'}">
                                <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${isEnabled ? 'translate-x-6' : 'translate-x-1'}"></span>
                            </button>
                        </div>
                        <p class="text-sm text-gray-300 leading-relaxed">${description}</p>
                    </div>
                </div>
            `;
        }

        window.handleRoleToggle = (key) => {
            roles[key] = !roles[key];
            render();
        };

        window.handleSetupInput = (field, value) => {
            if (field === 'gemini') geminiApiKey = value;
            if (field === 'groq') groqApiKey = value;
            if (field === 'mistral') mistralApiKey = value;
            if (field === 'ollamaModel') ollamaModel = value;
            if (field === 'numAIs') numAIs = parseInt(value);
            if (field === 'preferredRole') preferredRole = value;
            
            if (field === 'numAIs') document.getElementById('numAIsDisplay').innerText = numAIs;
            
            const btn = document.getElementById('startSetupBtn');
            const warn = document.getElementById('setupWarning');
            if (btn) btn.disabled = !isSetupValid();
            if (warn) warn.style.display = isSetupValid() ? 'none' : 'block';
        };

        window.toggleHumanPlaying = () => {
            humanPlaying = !humanPlaying;
            render();
        };

        window.toggleOllama = () => {
            useOllama = !useOllama;
            render();
        };

        window.submitSetup = (e) => {
            e.preventDefault();
            if (!isSetupValid()) return;
            showStartingMsg = true;
            render();
            
            setTimeout(() => {
                let totalPlayers = numAIs + (humanPlaying ? 1 : 0);
                let neutralCount = (roles.jester ? 1 : 0) + (roles.lover ? 1 : 0) + (roles.guesser ? 1 : 0);
                let nonNeutral = totalPlayers - neutralCount;
                
                let mafiaCount = Math.min(3, Math.max(1, Math.round(nonNeutral / 4))); 
                let townCount = nonNeutral - mafiaCount;

                let rolePool = [];
                
                if (roles.jailor && mafiaCount > 0) rolePool.push('Jailor');
                if (roles.eraser && rolePool.length < mafiaCount) rolePool.push('Eraser');
                if (roles.assassin && rolePool.length < mafiaCount) rolePool.push('Assassin');
                while (rolePool.filter(r => ['Jailor', 'Eraser', 'Assassin', 'Mafia'].includes(r)).length < mafiaCount) {
                    rolePool.push('Mafia');
                }

                let townRoles = [];
                if (roles.doctor) townRoles.push('Doctor');
                if (roles.detective) townRoles.push('Detective');
                if (roles.vigilante) townRoles.push('Vigilante');
                if (roles.spy) townRoles.push('Spy');
                if (roles.indecisive) townRoles.push('Indecisive');
                
                townRoles = townRoles.slice(0, townCount);
                rolePool.push(...townRoles);
                while (rolePool.length < mafiaCount + townCount) rolePool.push('Town');
                
                if (roles.jester) rolePool.push('Jester');
                if (roles.lover) rolePool.push('Lover');
                if (roles.guesser) rolePool.push('Guesser');

                rolePool = rolePool.sort(() => Math.random() - 0.5);
                
                let availableApis = [];
                if (geminiApiKey.trim()) availableApis.push('gemini');
                if (groqApiKey.trim()) availableApis.push('groq');
                if (mistralApiKey.trim()) availableApis.push('mistral');
                if (useOllama) availableApis.push('ollama');
                if (availableApis.length === 0) availableApis.push('offline'); 
                
                if (humanPlaying && preferredRole) {
                    const prefIndex = rolePool.indexOf(preferredRole);
                    if (prefIndex > -1) {
                        const temp = rolePool[0];
                        rolePool[0] = rolePool[prefIndex];
                        rolePool[prefIndex] = temp;
                    }
                }

                let shuffledNames = [...BOT_NAMES].sort(() => Math.random() - 0.5);
                let shuffledAvatars = [...AVATARS].sort(() => Math.random() - 0.5);
                
                players = [];
                for(let i=0; i < totalPlayers; i++) {
                    let isHuman = humanPlaying && i === 0;
                    let assignedApi = isHuman ? null : availableApis[i % availableApis.length];
                    players.push({
                        id: `player-${i}`,
                        isHuman: isHuman,
                        name: isHuman ? '' : shuffledNames[i],
                        role: rolePool[i],
                        playstyle: '',
                        avatar: isHuman ? null : shuffledAvatars[i % shuffledAvatars.length],
                        isAlive: true,
                        jailed: false,
                        hasBullet: rolePool[i] === 'Vigilante',
                        jailUses: rolePool[i] === 'Jailor' ? 2 : 0,
                        hasErase: rolePool[i] === 'Eraser',
                        hasAssassinate: rolePool[i] === 'Assassin',
                        hasGuess: rolePool[i] === 'Guesser',
                        loverBond: null,
                        api: assignedApi
                    });
                }
                
                showStartingMsg = false;
                appState = 'lobby';
                render();
            }, 800);
        };

        function renderSetup() {
            return `
            <div class="max-w-4xl mx-auto space-y-8 p-4 md:p-8 pb-20">
                <div class="text-center space-y-2">
                    <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-red-500">MACHINE MAFIA</h1>
                    <p class="text-gray-400 uppercase tracking-widest text-sm font-semibold">Game Configuration</p>
                </div>

                <form onsubmit="window.submitSetup(event)" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 md:p-8 shadow-2xl space-y-8">
                    <div class="space-y-4">
                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-sm font-semibold text-gray-300">
                                <i data-lucide="key" class="text-blue-400 w-4 h-4"></i> Gemini API Key
                            </label>
                            <input type="password" oninput="window.handleSetupInput('gemini', this.value)" value="${geminiApiKey}" placeholder="AIzaSy... (Optional if others are used)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
                        </div>

                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-sm font-semibold text-gray-300">
                                <i data-lucide="key" class="text-orange-400 w-4 h-4"></i> Groq API Key
                            </label>
                            <input type="password" oninput="window.handleSetupInput('groq', this.value)" value="${groqApiKey}" placeholder="gsk_... (Optional if others are used)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" />
                        </div>

                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-sm font-semibold text-gray-300">
                                <i data-lucide="key" class="text-yellow-400 w-4 h-4"></i> Mistral API Key
                            </label>
                            <input type="password" oninput="window.handleSetupInput('mistral', this.value)" value="${mistralApiKey}" placeholder="Mistral API Key..." class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition-all" />
                        </div>
                        
                        <div class="space-y-4 border-t border-gray-800 pt-4">
                            <div class="flex items-center justify-between bg-gray-950 p-4 rounded-xl border border-gray-800 transition-colors cursor-pointer" onclick="window.toggleOllama()">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="bot" class="text-teal-400 w-5 h-5"></i>
                                    <div class="flex flex-col"><span class="font-semibold text-gray-200">Local Ollama API</span><span class="text-sm text-gray-500">Run models locally via http://127.0.0.1:11434</span></div>
                                </div>
                                <button type="button" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${useOllama ? 'bg-teal-500' : 'bg-gray-600'}">
                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${useOllama ? 'translate-x-6' : 'translate-x-1'}"></span>
                                </button>
                            </div>
                            
                            ${useOllama ? `
                                <div class="flex flex-col gap-2 pl-4 border-l-2 border-teal-500/50 ml-2">
                                    <label class="text-sm font-semibold text-gray-300">Ollama Model Name</label>
                                    <input oninput="window.handleSetupInput('ollamaModel', this.value)" value="${ollamaModel}" placeholder="e.g. llama3.1" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all" />
                                </div>
                            ` : ''}
                        </div>
                        
                        <p id="setupWarning" class="text-red-400 text-xs font-semibold" style="display: ${isSetupValid() ? 'none' : 'block'}">At least one API provider (Key or Local) is required to start.</p>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 text-sm font-semibold text-gray-300"><i data-lucide="users" class="text-blue-400 w-4 h-4"></i> Number of AI Players</label>
                            <span id="numAIsDisplay" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-bold text-lg">${numAIs}</span>
                        </div>
                        <input type="range" min="5" max="12" step="1" value="${numAIs}" oninput="window.handleSetupInput('numAIs', this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500"/>
                        
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center justify-between bg-gray-950 p-4 rounded-xl border border-gray-800 hover:border-gray-700 transition-colors cursor-pointer" onclick="window.toggleHumanPlaying()">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="user" class="text-purple-400 w-5 h-5"></i>
                                    <div class="flex flex-col"><span class="font-semibold text-gray-200">Host Joins Game</span><span class="text-sm text-gray-500">Play alongside the AI (hides other players' roles)</span></div>
                                </div>
                                <button type="button" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${humanPlaying ? 'bg-purple-500' : 'bg-gray-600'}">
                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${humanPlaying ? 'translate-x-6' : 'translate-x-1'}"></span>
                                </button>
                            </div>

                            ${humanPlaying ? `
                                <div class="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-800 transition-all">
                                    <label class="text-sm font-semibold text-gray-300">Preferred Role</label>

                                        ${roles.lover ? `<option value="Lover" ${preferredRole==='Lover'?'selected':''}>Lover</option>` : ''}

                                        ${roles.jailor ? `<option value="Jailor" ${preferredRole==='Jailor'?'selected':''}>Jailor</option>` : ''}
                                        ${roles.eraser ? `<option value="Eraser" ${preferredRole==='Eraser'?'selected':''}>Eraser</option>` : ''}

                    <div class="space-y-4">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${renderRoleToggle('doctor', 'Doctor', 'Town', ROLE_DESCRIPTIONS['Doctor'], 'shield')}
                            ${renderRoleToggle('detective', 'Detective', 'Town', ROLE_DESCRIPTIONS['Detective'], 'search')}
                            ${renderRoleToggle('vigilante', 'Vigilante', 'Town', ROLE_DESCRIPTIONS['Vigilante'], 'crosshair')}
                            ${renderRoleToggle('spy', 'Spy', 'Town', ROLE_DESCRIPTIONS['Spy'], 'eye')}
                            ${renderRoleToggle('indecisive', 'Indecisive', 'Town', ROLE_DESCRIPTIONS['Indecisive'], 'help-circle')}
                            ${renderRoleToggle('jester', 'Jester', 'Neutral', ROLE_DESCRIPTIONS['Jester'], 'ghost')}
                            ${renderRoleToggle('lover', 'Lover', 'Neutral', ROLE_DESCRIPTIONS['Lover'], 'heart')}
                            ${renderRoleToggle('guesser', 'Guesser', 'Neutral', ROLE_DESCRIPTIONS['Guesser'], 'dices')}
                            ${renderRoleToggle('jailor', 'Jailor', 'Mafia', ROLE_DESCRIPTIONS['Jailor'], 'lock')}
                            ${renderRoleToggle('eraser', 'Eraser', 'Mafia', ROLE_DESCRIPTIONS['Eraser'], 'eraser')}
