                    <div class="pt-4">
                        <button id="startSetupBtn" type="submit" ${!isSetupValid() ? 'disabled' : ''} class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 disabled:from-gray-700 disabled:text-gray-500 text-white font-bold py-4 px-8 rounded-xl transition-all shadow-lg hover:shadow-blue-500/25 active:scale-[0.98]">
                            ${showStartingMsg ? `<i data-lucide="refresh-ccw" class="animate-spin w-5 h-5"></i> INITIALIZING LOBBY...` : `<i data-lucide="play" class="w-5 h-5"></i> INITIALIZE LOBBY`}
                        </button>
                    </div>
                </form>
            </div>
            `;
        }

        // ==========================================
        // LOBBY VIEW
        // ==========================================
        window.handleNameChange = (id, val) => {
            const p = players.find(x => x.id === id);
            if (p) p.name = val;
            checkLobbyReady();
        };

        window.handlePlaystyleChange = (id, val) => {
            const p = players.find(x => x.id === id);
            if (p) p.playstyle = val;
        };

        window.handleRoleSwap = (id) => {
            if (selectedSwapId === null) {
                selectedSwapId = id;
            } else if (selectedSwapId === id) {
                selectedSwapId = null;
            } else {
                const p1 = players.find(p => p.id === selectedSwapId);
                const p2 = players.find(p => p.id === id);
                if (p1 && p2) {
                    const temp = p1.role;
                    p1.role = p2.role;
                    p2.role = temp;
                }
                selectedSwapId = null;
            }
            render();
        };

        window.shuffleLobbyRoles = () => {
            let r = players.map(p => p.role).sort(() => Math.random() - 0.5);
            players.forEach((p, i) => p.role = r[i]);
            render();
        };

        function checkLobbyReady() {
            const humanPlayer = players.find(p => p.isHuman);
            const isReady = !humanPlaying || (humanPlayer && humanPlayer.name.trim() !== '');
            const btn = document.getElementById('enterMatchBtn');
            if (btn) btn.disabled = !isReady;
        }

        window.gotoSetup = () => {
            appState = 'setup';
            render();
        };

        function renderLobby() {
            const humanPlayer = players.find(p => p.isHuman);
            const aiPlayers = players.filter(p => !p.isHuman);
            
            let content = '';

            if (!humanPlaying) {
                content = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-gray-900 p-4 rounded-xl border border-gray-800">
                            <div class="flex items-center gap-2 text-gray-300">
                                <i data-lucide="users" class="text-blue-400 w-5 h-5"></i>
                                <span class="font-semibold">${players.length} AI Agents initialized</span>
                            </div>
                            <div class="flex items-center gap-4">
                                ${selectedSwapId ? `<span class="text-sm text-purple-400 animate-pulse font-medium hidden md:inline">Select another role to swap</span>` : ''}
                                <button onclick="window.shuffleLobbyRoles()" class="flex items-center gap-2 px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-200 rounded-lg text-sm font-medium transition-colors">
                                    <i data-lucide="shuffle" class="text-purple-400 w-4 h-4"></i> Shuffle Roles
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${players.map(p => {
                                const isSelected = selectedSwapId === p.id;
                                return `
                                <div class="bg-gray-900 border ${isSelected ? 'border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.15)]' : 'border-gray-800'} rounded-xl p-5 space-y-4 transition-all">
                                    <div class="flex justify-between items-start">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-full flex items-center justify-center border text-xl shadow-sm ${p.avatar.bg} ${p.avatar.border}">
                                                ${p.avatar.emoji}
                                            </div>
                                            <div>
                                                <input oninput="window.handleNameChange('${p.id}', this.value)" value="${p.name}" class="bg-transparent text-lg font-bold text-white focus:outline-none focus:border-b border-blue-500 px-1 w-full max-w-[150px]" placeholder="Agent Name"/>
                                            </div>
                                        </div>
                                        <button onclick="window.handleRoleSwap('${p.id}')" title="${isSelected ? 'Cancel swap' : 'Click to swap role'}" class="px-3 py-1.5 rounded-full text-sm font-bold border transition-all cursor-pointer ${getRolePillStyle(p.role, isSelected)}">
                                            ${p.role}
                                        </button>
                                    </div>
                                    <div>
                                        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 block">Playstyle Override (Optional)</label>
                                        <input onchange="window.handlePlaystyleChange('${p.id}', this.value)" value="${p.playstyle}" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:border-blue-500" placeholder="e.g. Aggressive, quiet, constantly accuses others..."/>
                                    </div>
                                </div>
                                `
                            }).join('')}
                        </div>
                    </div>
                `;
            } else {
                content = `
                    <div class="space-y-8">
                        <div class="bg-gradient-to-br from-gray-900 to-gray-950 border border-blue-500/30 rounded-2xl p-6 shadow-2xl shadow-blue-900/10 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-5 pointer-events-none"><i data-lucide="user-circle" style="width: 150px; height: 150px;"></i></div>
                            <h2 class="text-xl font-bold text-gray-200 mb-6 flex items-center gap-2"><i data-lucide="user-circle" class="text-blue-400 w-6 h-6"></i> Your Profile</h2>
                            <div class="grid md:grid-cols-2 gap-8 relative z-10">
                                <div class="space-y-2">
                                    <label class="text-sm font-semibold text-gray-400">Choose Your Alias <span class="text-red-400">*</span></label>
                                    <input oninput="window.handleNameChange('${humanPlayer.id}', this.value)" value="${humanPlayer.name}" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your name..." required/>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-semibold text-gray-400">Your Assigned Role</label>
                                    <div class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-lg font-bold flex items-center gap-2 ${getAlignmentColor(getRoleAlignment(humanPlayer.role))}">
                                        <i data-lucide="lock" class="w-5 h-5 opacity-50"></i> ${humanPlayer.role}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-300 mb-4 flex items-center gap-2"><i data-lucide="bot" class="text-purple-400 w-5 h-5"></i> AI Opponents (${aiPlayers.length})</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                                ${aiPlayers.map(p => `
                                    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full flex items-center justify-center border text-sm ${p.avatar.bg} ${p.avatar.border}">${p.avatar.emoji}</div>
                                        <span class="font-semibold text-gray-200">${p.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="max-w-4xl mx-auto space-y-8 p-4 md:p-8 pb-20">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">GAME LOBBY</h1>
                            <p class="text-gray-400 text-sm font-semibold">${humanPlaying ? 'Player Mode - Prepare for the match' : 'Moderator Mode - Configure AI Agents'}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="window.gotoSetup()" class="flex items-center gap-2 px-4 py-2 bg-gray-900 border border-gray-700 hover:bg-gray-800 rounded-lg text-sm font-medium transition-colors">
                                <i data-lucide="settings" class="w-4 h-4"></i> Back
                            </button>
                            <button id="enterMatchBtn" onclick="window.startGameSession()" class="flex items-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-lg text-sm font-bold transition-colors shadow-lg shadow-blue-500/20">
                                <i data-lucide="play" class="w-4 h-4"></i> ENTER MATCH
                            </button>
                        </div>
                    </div>
                    ${content}
                </div>
            `;
        }

        // ==========================================
        // GAME VIEW & ENGINE
        // ==========================================
        
        window.addLog = (text, visibility = ['all'], icon = null, speakerName = null) => {
            const newLog = { id: Math.random(), text, visibility, icon, speakerName };
            logs.push(newLog);
            
            // Structure into specific memory categories
            if (visibility.includes('all')) {
                if (speakerName) {
                    recentDiscussion.push(`${speakerName}: ${text}`);
                    if (recentDiscussion.length > 15) recentDiscussion.shift();
                } else {
                    publicEvents.push(`Day ${gameDay}, ${gamePhase}: ${text}`);
                }
            } else {
                players.forEach(ai => {
                    if (!ai.isHuman && ai.isAlive && (visibility.includes(ai.id) || (visibility.includes('Mafia') && getRoleAlignment(ai.role) === 'Mafia'))) {
                        if (speakerName) {
                            aiMemory[ai.id].privateKnowledge.push(`Mafia Chat - ${speakerName}: ${text}`);
                        } else {
                            aiMemory[ai.id].privateKnowledge.push(`Day ${gameDay}, ${gamePhase}: ${text}`);
                        }
                    }
                });
            }
            
            window.appendLogToDOM(newLog);
        };
        
        const syncUI = () => {
            renderGameBoard();
            renderModeratorPanel();
        };
        window.syncUI = syncUI;

        window.abortGame = () => {
            isGameActive = false;
            appState = 'lobby';
            if (humanResolve) humanResolve(null);
            render();
        };

        window.submitHumanInput = (val) => {
            if (humanResolve) humanResolve(val);
        };

        window.handleChatInputSubmit = () => {
            if (chatInputValue.trim()) {
                window.submitHumanInput(chatInputValue);
                chatInputValue = '';
            }
        };

        window.handleChatKeyDown = (e) => {
            if (e.key === 'Enter') window.handleChatInputSubmit();
        };

        window.handleAvatarClick = (id) => {
            if (humanInputMode === 'target') {
                const p = players.find(x=>x.id===id);
                if (p && p.isAlive) window.submitHumanInput(id);
            }
        };

        window.toggleAssassinationMenu = () => {
            assassinationMenuOpen = !assassinationMenuOpen;
            renderModeratorPanel();
        };

        window.handleHumanAssassinate = () => {
            const sp = players.find(p => p.isHuman);
            const targetPlayer = players.find(p => p.id === assassinTargetId);
            if (!sp || !targetPlayer || !assassinGuess) return;

            if (targetPlayer.role.toLowerCase() === assassinGuess.toLowerCase()) {
                let dayDeaths = [];
                killPlayer(targetPlayer, dayDeaths, ' (Assassinated)');
                window.addLog(`An Assassin struck in broad daylight! ${targetPlayer.name} was assassinated!`, ['all'], 'swords');
                if (dayDeaths.length > 1) {
                    window.addLog(`Other players died alongside them: ${dayDeaths.slice(1).join(', ')}`, ['all'], 'skull');
                }
            } else {
                sp.hasAssassinate = false;
                window.addLog(`Someone attempted to assassinate you and failed! You recognize their face: It was ${sp.name}!`, [targetPlayer.id], 'eye');
                window.addLog(`You attempted to assassinate ${targetPlayer.name} as a ${assassinGuess} but guessed wrong. You lost your ability.`, ['Mafia', 'moderator'], 'info');
            }

            assassinationMenuOpen = false;
            assassinTargetId = '';
            assassinGuess = '';
            
            let w = checkWinCondition();
            if (w) winner = w;
            render();
        };

        const isRoleVisible = (targetPlayer) => {
            if (!humanPlaying || winner !== null) return true; 
            const humanPlayer = players.find(p => p.isHuman);
            if (!humanPlayer || !humanPlayer.isAlive) return true; 
            if (targetPlayer.id === humanPlayer.id) return true; 
            const isHumanMafia = ['Mafia', 'Jailor', 'Eraser', 'Assassin'].includes(humanPlayer.role);
            const isTargetMafia = ['Mafia', 'Jailor', 'Eraser', 'Assassin'].includes(targetPlayer.role);
            if (isHumanMafia && isTargetMafia) return true;
            return false;
        };

        const isLogVisible = (log) => {
            if (!humanPlaying || winner !== null) return true; 
            const humanPlayer = players.find(p => p.isHuman);
            if (!humanPlayer || !humanPlayer.isAlive) return true; 
            
            if (log.visibility.includes('all')) return true;
            if (log.visibility.includes(humanPlayer.id)) return true;
            if (log.visibility.includes('Mafia') && ['Mafia', 'Jailor', 'Eraser', 'Assassin'].includes(humanPlayer.role)) return true;
            return false;
        };

        function renderGameBoard() {
            const tableEl = document.getElementById('game-table-center');
            if (tableEl) {
                tableEl.innerHTML = `
                    <div class="text-xl md:text-3xl font-black text-gray-700 tracking-widest">${winner ? 'GAME OVER' : gamePhase}</div>
                    <div class="text-xs md:text-sm font-medium text-gray-500 uppercase tracking-wider">${winner ? `${winner} WINS` : `Day ${gameDay}`}</div>
                    ${humanInputMode === 'target' ? `
                    <div class="absolute -bottom-14 md:-bottom-20 flex flex-col items-center gap-2 z-30 w-full max-w-[150%] text-center">
                        <div class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs md:text-sm font-bold shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                            ${humanPromptText}
                        </div>
                        <button onclick="window.submitHumanInput('skip')" class="px-4 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-600 rounded-full text-xs font-bold shadow-lg transition-colors cursor-pointer">
                            Skip / Abstain
                        </button>
                    </div>` : ''}
                `;
                tableEl.className = `absolute inset-[25%] rounded-full bg-gray-900 border-[8px] ${gamePhase.includes('Night') ? 'border-indigo-900/50' : 'border-yellow-700/30'} shadow-2xl flex flex-col items-center justify-center space-y-1 transition-colors duration-1000 z-0`;
            }

            const playersEl = document.getElementById('game-players');
            if (playersEl) {
                playersEl.innerHTML = players.map((p, i) => {
                    const angle = (i * 2 * Math.PI) / players.length - Math.PI / 2;
                    const x = 50 + 44 * Math.cos(angle);
                    const y = 50 + 44 * Math.sin(angle);
                    const isVisible = isRoleVisible(p);
                    const isActive = activePlayer === p.id;
                    const isTargetable = humanInputMode === 'target' && p.isAlive;
                    
                    return `
                        <div onclick="window.handleAvatarClick('${p.id}')" class="absolute flex flex-col items-center justify-center gap-1 -translate-x-1/2 -translate-y-1/2 w-24 z-10 transition-all ${isTargetable ? 'cursor-pointer hover:scale-110' : ''} ${!p.isAlive ? 'opacity-40 grayscale' : ''}" style="left: ${x}%; top: ${y}%;">
                            <div class="relative w-14 h-14 md:w-16 md:h-16 rounded-full flex items-center justify-center border-2 text-2xl md:text-3xl shadow-lg bg-gray-950 transition-all duration-300 ${p.avatar ? `${p.avatar.bg} ${p.avatar.border}` : 'bg-blue-900/30 border-blue-500/50 text-blue-400'} ${isActive ? 'ring-4 ring-purple-500 ring-offset-4 ring-offset-gray-950 scale-110' : ''} ${isTargetable ? 'ring-2 ring-blue-400 ring-offset-2 ring-offset-gray-950 hover:bg-blue-900/50' : ''}">
                                ${p.avatar ? p.avatar.emoji : '<i data-lucide="user-circle" class="w-8 h-8"></i>'}
                                ${!p.isAlive ? `<div class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-full"><i data-lucide="skull" class="text-red-500 w-6 h-6"></i></div>` : ''}
                            </div>
                            <div class="text-xs md:text-sm font-bold text-center truncate w-full px-1 drop-shadow-md ${isActive ? 'text-purple-400' : 'text-gray-100'}">
                                ${p.name || 'Anonymous'} ${p.isHuman ? '<span class="ml-1 text-[10px] text-blue-400 tracking-widest">(YOU)</span>' : ''}
                            </div>
                            <div class="h-5 flex items-center">
                                ${isVisible ? `<span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${getRoleBadgeStyle(p.role)} whitespace-nowrap shadow-sm">${p.role}</span>` : `<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-gray-800 border border-gray-700 text-gray-500 whitespace-nowrap">Unknown</span>`}
                            </div>
                        </div>
                    `;
                }).join('');
                lucide.createIcons({ root: playersEl });
            }
        }

        window.appendLogToDOM = (log) => {
            const isVisibleToHuman = isLogVisible(log);
            if (!isVisibleToHuman && !winner) return;
            
            let bgStyle = 'bg-gray-950 border-gray-800/50';
            if (log.speakerName) bgStyle = 'bg-gray-800/50 border-gray-700';
            if (!log.visibility.includes('all')) {
                if (log.visibility.includes('Mafia')) bgStyle = 'border-red-900/50 bg-red-950/40 text-red-50'; 
                else if (log.visibility.includes('moderator')) bgStyle = 'border-purple-500/30 bg-purple-900/10'; 
                else bgStyle = 'border-blue-500/30 bg-blue-900/10'; 
            }

            const el = document.createElement('div');
            el.className = `p-3 rounded-xl text-sm border ${bgStyle} ${!isVisibleToHuman ? 'opacity-60 grayscale' : ''}`;
            el.innerHTML = `
                ${!isVisibleToHuman ? `<div class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-1 flex items-center gap-1"><i data-lucide="eye" class="w-3 h-3"></i> [DIDN'T SEE]</div>` : ''}
                ${log.speakerName ? `<div class="font-bold mb-1 flex items-center gap-2 ${log.visibility.includes('Mafia') && !log.visibility.includes('all') ? 'text-red-400' : 'text-blue-400'}">${log.speakerName}</div>` : ''}
                <div class="${log.visibility.includes('Mafia') && !log.visibility.includes('all') ? 'text-red-200' : 'text-gray-300'} flex items-start gap-2">
                    ${log.icon ? `<span class="mt-0.5 opacity-70"><i data-lucide="${log.icon}" class="w-4 h-4"></i></span>` : ''}
                    <span class="leading-relaxed">${log.text}</span>
                </div>
            `;
            const container = document.getElementById('logs-container');
            if (container) {
                container.appendChild(el);
                lucide.createIcons({ root: el });
                container.scrollTop = container.scrollHeight;
            }
        };

        function renderModeratorPanel() {
            const panel = document.getElementById('moderator-panel');
            if (!panel) return;

            let assassinBtn = '';
            if (humanPlaying && !gamePhase.includes('Night')) {
                const sp = players.find(p => p.isHuman && p.role === 'Assassin' && p.isAlive && p.hasAssassinate);
                if (sp) {
                    assassinBtn = `<button onclick="window.toggleAssassinationMenu()" class="bg-red-600 hover:bg-red-500 text-white p-2 rounded-lg transition-colors flex items-center gap-2 text-xs font-bold shadow-lg"><i data-lucide="swords" class="w-4 h-4"></i> ${assassinationMenuOpen ? 'Cancel' : 'Assassinate'}</button>`;
                }
            }

            let assassinMenu = '';
            if (assassinationMenuOpen) {
                const opts = players.filter(p => p.isAlive && !p.isHuman).map(p => `<option value="${p.id}" ${assassinTargetId===p.id?'selected':''}>${p.name}</option>`).join('');
                assassinMenu = `
                    <div class="p-4 bg-red-950/40 border-b border-red-900/50 flex flex-col gap-3 shrink-0">
                        <div class="text-xs text-red-200 font-bold uppercase tracking-wider flex items-center gap-2"><i data-lucide="crosshair" class="w-4 h-4"></i> ASSASSINATION ATTACK</div>
                        <select onchange="window.assassinTargetId=this.value; renderModeratorPanel();" class="bg-gray-950 border border-gray-700 rounded-lg p-2.5 text-sm text-white focus:border-red-500 focus:outline-none">
                            <option value="">Select Target...</option>
                            ${opts}
                        </select>
                        <input type="text" placeholder="Guess Role (e.g. Doctor)" oninput="window.assassinGuess=this.value; renderModeratorPanel();" value="${assassinGuess}" class="bg-gray-950 border border-gray-700 rounded-lg p-2.5 text-sm text-white focus:border-red-500 focus:outline-none" />
                        <button onclick="window.handleHumanAssassinate()" ${!assassinTargetId || !assassinGuess.trim() ? 'disabled' : ''} class="bg-red-600 hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed text-white p-2.5 rounded-lg font-bold text-sm transition-colors shadow-md">Confirm Attack</button>
                    </div>
                `;
            }

            let inputArea = '';
            if (humanInputMode === 'chat') {
                inputArea = `
                    <div class="p-4 bg-gray-950 border-t border-gray-800">
                        <div class="text-xs text-blue-400 font-bold mb-2 uppercase tracking-wider">${humanPromptText}</div>
                        <div class="flex gap-2">
                            <input type="text" oninput="window.chatInputValue=this.value" onkeydown="window.handleChatKeyDown(event)" value="${chatInputValue}" placeholder="Type your response..." class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" />
                            <button onclick="window.handleChatInputSubmit()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 rounded-lg flex items-center justify-center transition-colors">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (winner) {
                inputArea = `
                    <div class="p-6 bg-gray-950 border-t border-gray-800 text-center space-y-3">
                        <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">${winner} WINS!</h2>
                        <div class="flex gap-2">
                            <button onclick="window.exportLogs()" class="flex-1 py-3 flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold text-gray-300 transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i> Logs
                            </button>
                            <button onclick="window.gotoSetup()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-white transition-colors">
                                Play Again
                            </button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('mod-header').innerHTML = `
                <div class="flex items-center gap-2">
                    <i data-lucide="bot" class="text-blue-400 w-5 h-5"></i>
                    <h2 class="font-bold text-gray-100">Moderator Console</h2>
                </div>
                ${assassinBtn}
            `;
            
            document.getElementById('assassin-menu-container').innerHTML = assassinMenu;
            document.getElementById('input-area-container').innerHTML = inputArea;
            
            const logsContainer = document.getElementById('logs-container');
            logsContainer.innerHTML = '';
            logs.forEach(log => window.appendLogToDOM(log));
            
            lucide.createIcons({ root: panel });
        }

        function renderGame() {
            return `
            <div class="flex flex-col md:flex-row overflow-hidden h-full">
                <!-- Left/Top: Game Board -->
                <div class="flex-1 relative flex flex-col items-center justify-center p-4 min-h-[60vh] md:min-h-screen">
                    <div class="absolute top-4 left-4 z-20">
                        <button onclick="window.abortGame()" class="px-4 py-2 bg-gray-900 border border-gray-700 hover:bg-gray-800 text-gray-300 rounded-lg text-xs font-bold transition-colors">ABORT GAME</button>
                    </div>
                    <div class="relative w-full max-w-xl aspect-square mx-auto">
                        <div id="game-table-center"></div>
                        <div id="game-players" class="absolute inset-0"></div>
                    </div>
                </div>

                <!-- Right/Bottom: Logs & Input -->
                <div id="moderator-panel" class="w-full md:w-96 bg-gray-900 border-t md:border-t-0 md:border-l border-gray-800 flex flex-col h-[40vh] md:h-screen shrink-0">
                    <div id="mod-header" class="p-4 border-b border-gray-800 bg-gray-950 flex items-center justify-between"></div>
                    <div id="assassin-menu-container"></div>
                    <div id="logs-container" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar"></div>
                    <div id="input-area-container"></div>
                </div>
            </div>
            `;
        }

        // ==========================================
        // ENGINE LOGIC
        // ==========================================
        window.startGameSession = () => {
            isGameActive = true;
            logs = [];
            winner = null;
            assassinationMenuOpen = false;
            doctorLastProtectedId = null; 
            appState = 'game';
            
            publicEvents = [];
            recentDiscussion = [];
            aiMemory = {};
            
            render();

            players.forEach(p => {
                if (!p.isHuman) {
                    aiMemory[p.id] = {
                        privateKnowledge: [],
                        actionHistory: []
                    };
                }
            });

            runGameLoop();
        };

        const callAI = async (playerId, taskPrompt, taskType, validTargetsArray = []) => {
            const ai = players.find(p => p.id === playerId);
            if (!ai) return "";
            
            // Safety: Truncate arrays if they get too large
            if (aiMemory[playerId].privateKnowledge.length > 25) {
                aiMemory[playerId].privateKnowledge = aiMemory[playerId].privateKnowledge.slice(-25);
            }
            if (aiMemory[playerId].actionHistory.length > 25) {
                aiMemory[playerId].actionHistory = aiMemory[playerId].actionHistory.slice(-25);
            }
            if (publicEvents.length > 40) {
                publicEvents = publicEvents.slice(-40);
            }
            
            const isNightPrompt = taskPrompt.toLowerCase().includes('tonight') || taskPrompt.toLowerCase().includes('night');
            if (ai.api === 'groq') {
                await delay(isNightPrompt ? 5000 : 8000); 
            }

            let attempts = 0;
            let validationError = "";
            let finalOutput = "";

            while (isGameActive && attempts < 3) {
                try {
                    attempts++;
                    const fullPrompt = buildAIPrompt(ai, taskPrompt, getFormatGuide(taskType), validationError);
                    let text = "";

                    if (ai.api === 'groq') {
                        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}` },
                            body: JSON.stringify({ model: 'llama-3.1-8b-instant', messages: [{ role: 'user', content: fullPrompt }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
                        text = data.choices?.[0]?.message?.content || "";
                        
                    } else if (ai.api === 'mistral') {
                        const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${mistralApiKey}` },
                            body: JSON.stringify({ model: 'mistral-large-latest', messages: [{ role: 'user', content: fullPrompt }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
                        text = data.choices?.[0]?.message?.content || "";
                        
                    } else if (ai.api === 'ollama') {
                        const response = await fetch('http://127.0.0.1:11434/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: ollamaModel, messages: [{ role: 'user', content: fullPrompt }], stream: false })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
                        text = data.message?.content || "";
                        
                    } else {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${geminiApiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
                        if (data.promptFeedback?.blockReason || data.candidates?.[0]?.finishReason === 'SAFETY') throw new Error("Response blocked by AI safety filters");
                        text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    }

                    // Strict Validation Loop
                    if (taskType === 'vote') {
                        const match = text.match(/VOTE:\s*([A-Za-z0-9_ ]+)/i);
                        if (!match) { validationError = "Missing 'VOTE: Name' syntax."; continue; }
                        const targetName = match[1].trim().toLowerCase();
                        if (targetName !== 'none' && !validTargetsArray.map(n=>n.toLowerCase()).includes(targetName)) {
                            validationError = `Invalid target '${targetName}'. Must be one of: ${validTargetsArray.join(', ')} or 'None'. Do not target dead players.`; continue;
                        }
                    } else if (taskType === 'target') {
                        const match = text.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                        if (!match) { validationError = "Missing 'TARGET: Name' syntax."; continue; }
                        const targetName = match[1].trim().toLowerCase();
                        if (targetName !== 'none' && !validTargetsArray.map(n=>n.toLowerCase()).includes(targetName)) {
                            validationError = `Invalid target '${targetName}'. Must be one of: ${validTargetsArray.join(', ')} or 'None'. Do not target dead players.`; continue;
                        }
                    } else if (taskType === 'guess') {
                        const match = text.match(/GUESS:\s*(Yes|No)/i);
                        if (!match) { validationError = "Missing 'GUESS: Yes' or 'GUESS: No' syntax."; continue; }
                    } else if (taskType === 'assassinate') {
                        const match = text.match(/ASSASSINATE:\s*([A-Za-z0-9_ ]+)(?:\s*-\s*([A-Za-z0-9_ ]+))?/i);
                        if (!match) { validationError = "Missing 'ASSASSINATE: Name - Role' syntax."; continue; }
                        const targetName = match[1].trim().toLowerCase();
                        if (targetName !== 'none' && !validTargetsArray.map(n=>n.toLowerCase()).includes(targetName)) {
                            validationError = `Invalid target '${targetName}'. Must be one of: ${validTargetsArray.join(', ')} or 'None'.`; continue;
                        }
                    } else if (taskType === 'chat') {
                        if (!text.trim()) { validationError = "Response cannot be empty."; continue; }
                    }

                    finalOutput = text.trim();
                    break;
                } catch (err) {
                    console.warn(`[${ai.name}] API Error:`, err);
                    const agentLabel = isNightPrompt ? 'An agent' : ai.name;
                    let waitTime = 5000;
                    const match = err.message.match(/try again in (\d+(\.\d+)?)s/i);
                    if (match) waitTime = Math.ceil(parseFloat(match[1]) * 1000) + 1000; 
                    else if (ai.api === 'groq') waitTime = 10000; 

                    if (attempts >= 3) {
                        window.addLog(`System: ${agentLabel}'s AI failed to respond after 3 attempts. Skipping their action.`, ['all'], 'info');
                        return "";
                    } else {
                        window.addLog(`System Error for ${agentLabel}: ${err.message}. Retrying in ${Math.round(waitTime/1000)}s (${attempts}/3)...`, ['all'], 'info');
                        await delay(waitTime);
                    }
                }
            }
            return finalOutput;
        };

        const getHumanInput = (mode, promptText) => {
            return new Promise((resolve) => {
                humanInputMode = mode;
                humanPromptText = promptText;
                humanResolve = (val) => {
                    humanInputMode = null;
                    resolve(val);
                };
                renderGameBoard();
                renderModeratorPanel();
            });
        };

        const checkWinCondition = () => {
            const alive = players.filter(p => p.isAlive);
            const aliveMafia = alive.filter(p => getRoleAlignment(p.role) === 'Mafia').length;
            const aliveTown = alive.length - aliveMafia;

            if (aliveMafia === 0) return 'Town';
            if (aliveMafia >= aliveTown) return 'Mafia';
            return null;
        };

        const killPlayer = (targetPlayer, deathsArray, reason = '') => {
            if (!targetPlayer.isAlive) return;
            targetPlayer.isAlive = false;
            deathsArray.push(targetPlayer.name + reason);

            const lover = players.find(p => p.role === 'Lover' && p.loverBond === targetPlayer.id && p.isAlive);
            if (lover) killPlayer(lover, deathsArray, ' (Died of a broken heart)');
        };

        const performAIAssassinations = async () => {
            const aliveAIAssassins = players.filter(p => p.isAlive && p.role === 'Assassin' && p.hasAssassinate && !p.isHuman);
            for (let sp of aliveAIAssassins) {
                if (!isGameActive) return false;
                if (isRoleVisible(sp)) activePlayer = sp.id; else activePlayer = null;
                renderGameBoard();
                
                const otherAliveNames = players.filter(p => p.isAlive && p.id !== sp.id).map(p => p.name);
                const currentRoles = [...new Set(players.map(p => p.role))].join(', ');

                let target = null;
                let guessRole = '';

                let promptTask = `You can guess a player's exact role right now. If right, they are eliminated and you can assassinate again tomorrow. If wrong, they learn you are the Assassin and you LOSE this ability forever. You do NOT have to use it today; wait until you are certain. Valid targets: ${otherAliveNames.join(', ')}. Possible roles: ${currentRoles}.`;
                
                let res = await callAI(sp.id, promptTask, 'assassinate', otherAliveNames);
                window.addLog(`(Internal thought): ${res}`, ['moderator', 'Mafia'], null, sp.name);
                const match = res.match(/ASSASSINATE:\s*([A-Za-z0-9_ ]+)\s*-\s*([A-Za-z0-9_ ]+)/i);
                if (match && match[1].toLowerCase().trim() !== 'none') {
                    const matchedName = match[1].trim().toLowerCase();
                    target = players.find(p => p.name.toLowerCase() === matchedName && p.isAlive);
                    guessRole = match[2].trim();
                }

                if (target && guessRole) {
                    aiMemory[sp.id].actionHistory.push(`Day ${gameDay}: Attempted to assassinate ${target.name} as a ${guessRole}.`);
                    if (target.role.toLowerCase() === guessRole.toLowerCase()) {
                        let dayDeaths = [];
                        killPlayer(target, dayDeaths, ' (Assassinated)');
                        window.addLog(`An Assassin struck in broad daylight! ${target.name} was assassinated!`, ['all'], 'swords');
                        if (dayDeaths.length > 1) {
                            window.addLog(`Other players died alongside them: ${dayDeaths.slice(1).join(', ')}`, ['all'], 'skull');
                        }
                    } else {
                        sp.hasAssassinate = false;
                        window.addLog(`Someone attempted to assassinate you and failed! You recognize their face: It was ${sp.name}!`, [target.id], 'eye');
                        window.addLog(`${sp.name} attempted to assassinate ${target.name} as a ${guessRole} but guessed wrong. They lost their ability.`, ['Mafia', 'moderator'], 'info');
                    }
                    
                    let w = checkWinCondition();
                    if (w) { winner = w; return true; }
                    renderGameBoard();
                    await gameDelay(3000, false);
                }
            }
            activePlayer = null;
            renderGameBoard();
            return false;
        };

        const runGameLoop = async () => {
            let day = 1;
            let loopWinner = null;

            renderGameBoard();
            renderModeratorPanel();

            const indecisives = players.filter(p => p.role === 'Indecisive');
            if (indecisives.length > 0) {
                await delay(2000);
                indecisives.forEach(ind => {
                    window.addLog(`PUBLIC KNOWLEDGE: ${ind.name} is the Indecisive. They are confirmed Town but cannot vote.`, ['all'], 'info');
                });
            }

            try {
                while (isGameActive) {
                    gameDay = day;
                    
                    // ================= NIGHT PHASE =================
                    gamePhase = 'Night Phase';
                    renderGameBoard();
                    renderModeratorPanel();
                    window.addLog(`Night ${day} begins.`, ['all'], 'bot');
                    await gameDelay(3000, true);

                    nightActions = { protect: null, protectId: null, investigate: null, investigateId: null, jail: null, shoot: null, shootId: null, erase: null, guesserActive: false, mafiaTarget: null };

                    // 1. Mafia Discussion & Vote
                    const aliveMafia = players.filter(p => p.isAlive && getRoleAlignment(p.role) === 'Mafia');
                    const validMafiaTargets = players.filter(p => p.isAlive && getRoleAlignment(p.role) !== 'Mafia').map(p => p.name);

                    if (aliveMafia.length > 0) {
                        window.addLog('Mafia are discussing...', ['moderator'], 'lock');
                        
                        for (let m of aliveMafia) {
                            if (!isGameActive) return;
                            if (isRoleVisible(m)) activePlayer = m.id; else activePlayer = null;
                            renderGameBoard();
                            
                            let msg = '';
                            if (m.isHuman) {
                                msg = await getHumanInput('chat', 'Discuss with fellow Mafia who to kill.');
                            } else {
                                msg = await callAI(m.id, `Discuss with your fellow mafia who you should eliminate tonight. Valid targets are: ${validMafiaTargets.join(', ')}. Write exactly one private discussion message. Do not vote yet.`, 'chat');
                            }
                            if (msg) {
                                window.addLog(msg, ['Mafia', 'moderator'], null, m.name);
                            }
                            await gameDelay(4000, true);
                        }

                        let voteCounts = {};
                        for (let m of aliveMafia) {
                            if (!isGameActive) return;
                            if (isRoleVisible(m)) activePlayer = m.id; else activePlayer = null;
                            renderGameBoard();
                            let voteTarget = null;
                            
                            if (m.isHuman) {
                                let targetId = await getHumanInput('target', 'Select a player to KILL.');
                                if (targetId !== 'skip') {
                                    voteTarget = players.find(p => p.id === targetId)?.name;
                                }
                                let explanation = await getHumanInput('chat', 'Explain your vote (or abstention) to your fellow Mafia:');
                                if (voteTarget) window.addLog(`Voted to kill ${voteTarget}. "${explanation}"`, ['Mafia', 'moderator'], null, m.name);
                                else window.addLog(`Abstained from voting. "${explanation}"`, ['Mafia', 'moderator'], null, m.name);
                            } else {
                                let msg = await callAI(m.id, `Who do you vote to kill? Valid targets are: ${validMafiaTargets.join(', ')}.`, 'vote', validMafiaTargets);
                                window.addLog(msg, ['Mafia', 'moderator'], null, m.name);
                                const match = msg.match(/VOTE:\s*([A-Za-z0-9_ ]+)/i);
                                if (match) {
                                    const matchedName = match[1].trim().toLowerCase();
                                    const validPlayer = players.find(p => p.isAlive && getRoleAlignment(p.role) !== 'Mafia' && p.name.toLowerCase() === matchedName);
                                    if (validPlayer) voteTarget = validPlayer.name;
                                }
                                if (!voteTarget) voteTarget = players.find(p => p.isAlive && getRoleAlignment(p.role) !== 'Mafia')?.name;
                            }
                            if (voteTarget) {
                                voteCounts[voteTarget] = (voteCounts[voteTarget] || 0) + 1;
                                if (!m.isHuman) aiMemory[m.id].actionHistory.push(`Night ${day}: Voted to kill ${voteTarget}.`);
                            }
                            await gameDelay(4000, true);
                        }
                        
                        let maxVotes = 0;
                        for (const [target, count] of Object.entries(voteCounts)) {
                            if (count > maxVotes) {
                                maxVotes = count;
                                nightActions.mafiaTarget = players.find(p => p.name.toLowerCase() === target.toLowerCase() && p.isAlive);
                            }
                        }
                        if (nightActions.mafiaTarget) {
                            window.addLog(`Mafia decided to kill ${nightActions.mafiaTarget.name}.`, ['Mafia', 'moderator'], 'skull');
                        }
                    }
                    activePlayer = null;
                    renderGameBoard();

                    // 2. Special Roles (Concurrent)
                    window.addLog('Special roles are acting...', ['moderator']);
                    const aliveSpecials = players.filter(p => p.isAlive && !['Town', 'Mafia', 'Jester', 'Indecisive', 'Assassin'].includes(p.role));
                    
                    for (let sp of aliveSpecials) {
                        if (!isGameActive) return;
                        if (isRoleVisible(sp)) activePlayer = sp.id; else activePlayer = null;
                        renderGameBoard();
                        
                        const allAliveNames = players.filter(p => p.isAlive).map(p => p.name);
                        const otherAliveNames = players.filter(p => p.isAlive && p.id !== sp.id).map(p => p.name);

                        if (sp.role === 'Doctor') {
                            const lastProtectedPlayer = players.find(p => p.id === doctorLastProtectedId);
                            const lastProtectedName = lastProtectedPlayer ? lastProtectedPlayer.name : 'nobody';

                            if (sp.isHuman) {
                                let validTarget = false;
                                let promptMsg = `Select a player to PROTECT (including yourself). Last protected: ${lastProtectedName}`;
                                while (!validTarget) {
                                    let targetId = await getHumanInput('target', promptMsg);
                                    if (targetId === 'skip') {
                                        validTarget = true;
                                        nightActions.protect = null;
                                    } else if (targetId === doctorLastProtectedId) {
                                        promptMsg = `Cannot protect ${lastProtectedName} again! Select a DIFFERENT player.`;
                                    } else {
                                        validTarget = true;
                                        nightActions.protect = players.find(p => p.id === targetId);
                                        nightActions.protectId = sp.id;
                                        doctorLastProtectedId = targetId;
                                    }
                                }
                            } else {
                                let res = await callAI(sp.id, `Who do you protect tonight? Valid targets: ${allAliveNames.join(', ')}. You CAN protect yourself. You CANNOT protect ${lastProtectedName} again.`, 'target', allAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', sp.id], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match) {
                                    const targetName = match[1].trim().toLowerCase();
                                    const targetPlayer = players.find(p => p.name.toLowerCase() === targetName && p.isAlive);
                                    if (targetPlayer && targetPlayer.id !== doctorLastProtectedId) {
                                        nightActions.protect = targetPlayer;
                                        nightActions.protectId = sp.id;
                                        doctorLastProtectedId = targetPlayer.id;
                                        aiMemory[sp.id].actionHistory.push(`Night ${day}: Protected ${targetPlayer.name}.`);
                                    } else {
                                        window.addLog(`Doctor attempted an invalid protection and did nothing.`, ['moderator', sp.id], 'shield');
                                    }
                                }
                            }
                            if (nightActions.protect) window.addLog(`Doctor protected ${nightActions.protect.name}.`, ['moderator', sp.id], 'shield');
                        } 
                        
                        else if (sp.role === 'Detective') {
                            if (sp.isHuman) {
                                let targetId = await getHumanInput('target', 'Select a player to INVESTIGATE.');
                                if (targetId !== 'skip') {
                                    nightActions.investigate = players.find(p => p.id === targetId);
                                    nightActions.investigateId = sp.id;
                                }
                            } else {
                                let res = await callAI(sp.id, `Who do you investigate tonight? Valid targets: ${otherAliveNames.join(', ')}.`, 'target', otherAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', sp.id], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match) {
                                    const targetPlayer = players.find(p => p.name.toLowerCase() === match[1].trim().toLowerCase() && p.isAlive);
                                    nightActions.investigate = targetPlayer;
                                    nightActions.investigateId = sp.id;
                                    if (targetPlayer) aiMemory[sp.id].actionHistory.push(`Night ${day}: Investigated ${targetPlayer.name}.`);
                                }
                            }
                        }

                        else if (sp.role === 'Lover' && day === 1) {
                            if (sp.isHuman) {
                                let targetId = await getHumanInput('target', 'Select a player to BOND with. If they die, you die. If they win, you win.');
                                if (targetId !== 'skip' && targetId !== sp.id) sp.loverBond = targetId;
                            } else {
                                let res = await callAI(sp.id, `It is Night 1. You must choose a player to bond with. If they die, you die. If they win, you win. Valid targets: ${otherAliveNames.join(', ')}.`, 'target', otherAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', sp.id], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match) {
                                    const t = players.find(p => p.name.toLowerCase() === match[1].trim().toLowerCase() && p.isAlive);
                                    if (t) {
                                        sp.loverBond = t.id;
                                        aiMemory[sp.id].actionHistory.push(`Night 1: Bonded with ${t.name}.`);
                                    }
                                }
                            }
                            if (sp.loverBond) window.addLog(`Lover bonded with ${players.find(p=>p.id===sp.loverBond).name}.`, ['moderator', sp.id], 'heart');
                        }

                        else if (sp.role === 'Guesser' && sp.hasGuess) {
                            if (sp.isHuman) {
                                let guess = await getHumanInput('chat', `Do you want to use your one-time guess that you WILL be targeted tonight? (Type 'Yes' to guess, 'No' to save it).`);
                                if (guess.trim().toLowerCase() === 'yes') {
                                    nightActions.guesserActive = true;
                                    sp.hasGuess = false;
                                }
                            } else {
                                let res = await callAI(sp.id, `You have a one-time ability to guess if you will be targeted by ANY role tonight. If right, you win immediately. If wrong, you are eliminated. You do NOT have to use it tonight; you can save it. Do you use it tonight?`, 'guess');
                                window.addLog(`(Internal thought): ${res}`, ['moderator', sp.id], null, sp.name);
                                const match = res.match(/GUESS:\s*(Yes|No)/i);
                                if (match && match[1].toLowerCase() === 'yes') {
                                    nightActions.guesserActive = true;
                                    sp.hasGuess = false;
                                    aiMemory[sp.id].actionHistory.push(`Night ${day}: Used Guesser ability.`);
                                }
                            }
                            if (nightActions.guesserActive) window.addLog(`Guesser locked in their prediction for tonight!`, ['moderator', sp.id], 'dices');
                        }

                        else if (sp.role === 'Jailor' && sp.jailUses > 0) {
                            if (sp.isHuman) {
                                let targetId = await getHumanInput('target', `Select a player to JAIL (mutes them and blocks role). Uses left: ${sp.jailUses}.`);
                                if (targetId !== 'skip' && targetId !== sp.id) {
                                    nightActions.jail = players.find(p => p.id === targetId);
                                    sp.jailUses--;
                                }
                            } else {
                                let res = await callAI(sp.id, `You have ${sp.jailUses} jail use(s) left for the game. Jailing blocks a player's night action and mutes them tomorrow. Use this tactically to silence important players or stop investigations! You do NOT have to use it tonight. Valid targets: ${otherAliveNames.join(', ')}.`, 'target', otherAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', 'Mafia'], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match && match[1].toLowerCase().trim() !== 'none') {
                                    const t = players.find(p => p.name.toLowerCase() === match[1].trim().toLowerCase() && p.isAlive);
                                    if (t) {
                                        nightActions.jail = t;
                                        sp.jailUses--;
                                        aiMemory[sp.id].actionHistory.push(`Night ${day}: Jailed ${t.name}.`);
                                    }
                                }
                            }
                            if (nightActions.jail) window.addLog(`Jailor jailed ${nightActions.jail.name}.`, ['Mafia', 'moderator'], 'lock');
                        }

                        else if (sp.role === 'Eraser' && sp.hasErase) {
                            if (sp.isHuman) {
                                let targetId = await getHumanInput('target', 'Select a player to ERASE their role (Turns them to Town).');
                                if (targetId !== 'skip' && targetId !== sp.id) {
                                    nightActions.erase = players.find(p => p.id === targetId);
                                    sp.hasErase = false;
                                }
                            } else {
                                let res = await callAI(sp.id, `You have 1 erase use left for the ENTIRE game. Erasing turns a player into a Vanilla Town. You do NOT have to use it tonight; you can save it. Valid targets: ${otherAliveNames.join(', ')}.`, 'target', otherAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', 'Mafia'], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match && match[1].toLowerCase().trim() !== 'none') {
                                    const t = players.find(p => p.name.toLowerCase() === match[1].trim().toLowerCase() && p.isAlive);
                                    if(t) {
                                        nightActions.erase = t;
                                        sp.hasErase = false;
                                        aiMemory[sp.id].actionHistory.push(`Night ${day}: Attempted to Erase ${t.name}.`);
                                    }
                                }
                            }
                            if (nightActions.erase) window.addLog(`Eraser targeted ${nightActions.erase.name}.`, ['Mafia', 'moderator'], 'eraser');
                        }

                        else if (sp.role === 'Vigilante' && sp.hasBullet) {
                            if (sp.isHuman) {
                                let targetId = await getHumanInput('target', 'Select a player to SHOOT.');
                                if (targetId !== 'skip' && targetId !== sp.id) {
                                    nightActions.shoot = players.find(p => p.id === targetId);
                                    nightActions.shootId = sp.id;
                                    sp.hasBullet = false;
                                }
                            } else {
                                let res = await callAI(sp.id, `You have a gun with 1 bullet for the ENTIRE game. You do NOT have to shoot tonight; you can save it. Valid targets: ${otherAliveNames.join(', ')}.`, 'target', otherAliveNames);
                                window.addLog(`(Internal thought): ${res}`, ['moderator', sp.id], null, sp.name);
                                const match = res.match(/TARGET:\s*([A-Za-z0-9_ ]+)/i);
                                if (match && match[1].toLowerCase().trim() !== 'none') {
                                    const t = players.find(p => p.name.toLowerCase() === match[1].trim().toLowerCase() && p.isAlive);
                                    if(t) {
                                        nightActions.shoot = t;
                                        nightActions.shootId = sp.id;
                                        sp.hasBullet = false;
                                        aiMemory[sp.id].actionHistory.push(`Night ${day}: Shot ${t.name}.`);
                                    }
                                }
                            }
                        }
                        await gameDelay(3000, true);
                    }
                    activePlayer = null;
                    renderGameBoard();

                    // 3. Resolve Night
                    window.addLog('Resolving night actions...', ['moderator']);
                    players.forEach(p => p.jailed = false); 
                    let deaths = [];
                    let predictorWon = false;
                    
                    if (nightActions.jail) {
                        let target = nightActions.jail;
                        target.jailed = true;
                        window.addLog(`You were dragged off to jail! You could not perform your role tonight and cannot speak tomorrow.`, [target.id], 'lock');
                    }

                    let doctor = players.find(p => p.id === nightActions.protectId);
                    let detective = players.find(p => p.id === nightActions.investigateId);
                    let vigilante = players.find(p => p.id === nightActions.shootId);

                    if (nightActions.erase) {
                        let target = nightActions.erase;
                        let docTarget = nightActions.protect;
                        if (docTarget && docTarget.id === target.id && doctor && !doctor.jailed) {
                            window.addLog(`Eraser tried to erase a role, but the Doctor protected them!`, ['Mafia', 'moderator'], 'shield');
                        } else {
                            const originalRole = target.role;
                            target.role = 'Town';
                            window.addLog(`Your role has been ERASED by the Mafia! You are now a vanilla Town member.`, [target.id], 'eraser');
                            window.addLog(`Eraser successfully erased ${target.name}'s role (${originalRole}).`, ['Mafia', 'moderator'], 'eraser');
                            window.addLog(`A ${originalRole} has been erased in the night! Their abilities are gone forever.`, ['all'], 'eraser');
                        }
                    }

                    if (nightActions.investigate && detective && !detective.jailed) {
                        let target = nightActions.investigate;
                        let isMafia = getRoleAlignment(target.role) === 'Mafia';
                        window.addLog(`INVESTIGATION RESULT: ${target.name} is ${isMafia ? 'MAFIA' : 'NOT MAFIA'}.`, [detective.id, 'moderator'], 'search');
                    }

                    let spy = players.find(p => p.role === 'Spy' && p.isAlive);
                    if (spy && !spy.jailed) {
                        let uniqueRoles = new Set(players.filter(p => p.isAlive).map(p => p.role)).size;
                        window.addLog(`SPY INTEL: There are ${uniqueRoles} unique roles remaining.`, [spy.id, 'moderator'], 'eye');
                    }

                    let guesser = players.find(p => p.role === 'Guesser' && p.isAlive);
                    let guesserWon = false;
                    if (guesser && nightActions.guesserActive) {
                        const pt = guesser.id;
                        let targeted = false;
                        
                        if (nightActions.mafiaTarget?.id === pt) targeted = true;
                        if (nightActions.protect?.id === pt) targeted = true;
                        if (nightActions.investigate?.id === pt) targeted = true;
                        if (nightActions.shoot?.id === pt) targeted = true;
                        if (nightActions.jail?.id === pt) targeted = true;
                        if (nightActions.erase?.id === pt) targeted = true;

                        if (targeted) {
                            window.addLog(`The Guesser successfully predicted they would be targeted!`, ['all'], 'dices');
                            guesserWon = true;
                        } else {
                            killPlayer(guesser, deaths, ' (Guessed incorrectly)');
                        }
                    }

                    if (guesserWon) {
                        winner = 'Guesser';
                        render();
                        break;
                    }

                    let mTarget = nightActions.mafiaTarget;
                    if (mTarget && mTarget.isAlive) {
                        if (nightActions.protect && nightActions.protect.id === mTarget.id && doctor && !doctor.jailed) {
                            window.addLog(`Someone was attacked, but the Doctor saved them!`, ['all'], 'shield');
                        } else {
                            killPlayer(mTarget, deaths);
                        }
                    }

                    let vTarget = nightActions.shoot;
                    if (vTarget && vigilante && !vigilante.jailed && vTarget.isAlive) {
                        killPlayer(vTarget, deaths);
                        window.addLog(`A gunshot was heard in the night!`, ['all'], 'crosshair');
                    }

                    renderGameBoard();
                    loopWinner = checkWinCondition();
                    if (loopWinner) { winner = loopWinner; render(); break; }

                    // ================= DAY PHASE =================
                    gamePhase = 'Day Phase';
                    renderGameBoard();
                    renderModeratorPanel();
                    window.addLog(`Day ${day} dawns.`, ['all']);
                    
                    if (deaths.length === 0) {
                        window.addLog(`Miraculously, nobody died last night.`, ['all']);
                    } else {
                        deaths.forEach(d => window.addLog(`${d} was found dead.`, ['all'], 'skull'));
                    }

                    loopWinner = checkWinCondition();
                    if (loopWinner) { winner = loopWinner; render(); break; }
                    await gameDelay(4000, false);

                    if (await performAIAssassinations()) break;

                    // Day Discussions (2 Rounds)
                    for (let round = 1; round <= 2; round++) {
                        window.addLog(`Day ${day} - Discussion Round ${round}`, ['all']);
                        const aliveDiscussants = players.filter(p => p.isAlive);
                        
                        for (let p of aliveDiscussants) {
                            if (!isGameActive) return;
                            activePlayer = p.id;
                            renderGameBoard();
                            
                            if (p.jailed) {
                                window.addLog(`${p.name} is jailed and cannot speak!`, ['all'], 'lock');
                                await gameDelay(4000, false);
                                continue;
                            }

                            let msg = '';
                            if (p.isHuman) {
                                msg = await getHumanInput('chat', 'What do you have to say to the town?');
                            } else {
                                msg = await callAI(p.id, `Write exactly one public discussion message. Defend yourself, accuse others, or share information. Do not vote. Do not perform any actions. Do not include internal thoughts.`, 'chat');
                            }
                            if (msg) window.addLog(msg, ['all'], null, p.name);
                            await gameDelay(5000, false);
                        }
                    }

                    if (await performAIAssassinations()) break;

                    // Day Voting
                    gamePhase = 'Voting Phase';
                    renderGameBoard();
                    renderModeratorPanel();
                    window.addLog(`It is time to vote.`, ['all']);
                    let dayVotes = {};
                    const aliveVoters = players.filter(p => p.isAlive);
                    const validDayTargets = aliveVoters.map(v => v.name);

                    for (let p of aliveVoters) {
                        if (!isGameActive) return;
                        activePlayer = p.id;
                        renderGameBoard();
                        let voteTarget = null;
                        
                        if (p.role === 'Indecisive') {
                            window.addLog(`${p.name} is Indecisive and cannot vote.`, ['all'], 'help-circle');
                            await gameDelay(3000, false);
                            continue;
                        }
                        
                        if (p.isHuman) {
                            let targetId = await getHumanInput('target', 'Select a player to VOTE OUT.');
                            if (targetId !== 'skip' && targetId !== p.id) {
                                voteTarget = players.find(t => t.id === targetId)?.name;
                            }
                            let explanation = await getHumanInput('chat', 'Explain your vote (or abstention) to the town:');
                            if (voteTarget) window.addLog(`Voted for ${voteTarget}. "${explanation}"`, ['all'], null, p.name);
                            else window.addLog(`Abstained from voting. "${explanation}"`, ['all'], null, p.name);
                        } else {
                            let msg = await callAI(p.id, `Who do you vote to eliminate? Valid targets are: ${validDayTargets.join(', ')}.`, 'vote', validDayTargets);
                            window.addLog(msg, ['all'], null, p.name);
                            const match = msg.match(/VOTE:\s*([A-Za-z0-9_ ]+)/i);
                            if (match && match[1].toLowerCase().trim() !== 'none') {
                                voteTarget = players.find(t => t.name.toLowerCase() === match[1].trim().toLowerCase() && t.isAlive)?.name;
                            }
                        }
                        if (voteTarget) {
                            dayVotes[voteTarget] = (dayVotes[voteTarget] || 0) + 1;
                            if(!p.isHuman) aiMemory[p.id].actionHistory.push(`Day ${day}: Voted for ${voteTarget}.`);
                        }
                        await gameDelay(5000, false);
                    }

                    activePlayer = null;
                    renderGameBoard();

                    // Resolve Day Vote
                    let maxDayVotes = 0;
                    let eliminatedTarget = null;
                    let isTie = false;
                    
                    for (const [target, count] of Object.entries(dayVotes)) {
                        if (count > maxDayVotes) {
                            maxDayVotes = count;
                            eliminatedTarget = players.find(t => t.name === target);
                            isTie = false;
                        } else if (count === maxDayVotes) {
                            isTie = true;
                        }
                    }

                    if (maxDayVotes > aliveVoters.filter(p=>p.role !== 'Indecisive').length / 2 && eliminatedTarget && !isTie) {
                        let dayDeaths = [];
                        killPlayer(eliminatedTarget, dayDeaths);
                        
                        window.addLog(`The town has spoken. ${eliminatedTarget.name} is executed!`, ['all'], 'ghost');
                        const alignment = getRoleAlignment(eliminatedTarget.role);
                        window.addLog(`Their alignment was: ${alignment.toUpperCase()}.`, ['all']);
                        
                        if (dayDeaths.length > 1) {
                            window.addLog(`Other players died alongside them: ${dayDeaths.slice(1).join(', ')}`, ['all'], 'skull');
                        }

                        if (eliminatedTarget.role === 'Jester') {
                            loopWinner = 'Jester';
                            winner = loopWinner;
                            render();
                            break;
                        }
                    } else {
                        window.addLog(`No majority was reached. Nobody is executed today.`, ['all']);
                    }

                    loopWinner = checkWinCondition();
                    if (loopWinner) { winner = loopWinner; render(); break; }

                    day++;
                }
                
                // ================= POST GAME PHASE =================
                if (isGameActive && loopWinner !== null) {
                    gamePhase = 'Post-Game';
                    renderGameBoard();
                    renderModeratorPanel();
                    window.addLog('--- CLOSING STATEMENTS ---', ['all']);
                    
                    let finalWinnerString = loopWinner;
                    if (loopWinner === 'Town' || loopWinner === 'Mafia') {
                        const aliveLover = players.find(p => p.role === 'Lover' && p.isAlive);
                        if (aliveLover) {
                            const bondPlayer = players.find(p => p.id === aliveLover.loverBond);
                            if (bondPlayer && getRoleAlignment(bondPlayer.role) === loopWinner) {
                                finalWinnerString = `${loopWinner} & Lover`;
                                winner = finalWinnerString;
                                renderModeratorPanel();
                            }
                        }
                    }

                    for (let p of players) {
                        if (!isGameActive) return;
                        activePlayer = p.id;
                        renderGameBoard();
                        
                        if (p.isHuman) {
                            let msg = await getHumanInput('chat', 'Game Over! Enter your final closing statement / trash talk:');
                            if (msg) window.addLog(msg, ['all'], null, p.name);
                        } else {
                            let msg = await callAI(p.id, `The game is over. The winner is: ${finalWinnerString}. Give one final short, in-character closing statement, reaction, or trash talk. Limit to 1 sentence.`, 'chat');
                            if (msg) window.addLog(msg, ['all'], null, p.name);
                        }
                        await gameDelay(3000, false);
                    }
                    activePlayer = null;
                    renderGameBoard();
                }

            } catch (e) {
                console.error("Game loop aborted", e);
            }
        };

        // Initialize App
        render();
    </script>
</body>
</html>
